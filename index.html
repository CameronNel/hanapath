<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>HanaPath</title>
    <meta name="description" content="A learner-first Korean app with Today, Path, Practice, and Library tabs." />
    <meta name="theme-color" content="#0f1026" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HanaPath" />
    <link rel="stylesheet" href="./styles.css?v=20260628v" />
    <script defer src="./audio_map.js"></script>
    <script defer src="./app.js?v=20260628v"></script>
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>
    <div id="correctToast" class="correct-toast" role="status" aria-live="polite" aria-atomic="true" hidden>Correct!</div>
    <div id="retryToast" class="retry-toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

    <!-- Onboarding wizard -->
    <div id="onboarding" class="screen-shell"></div>

    <!-- Main app shell -->
    <div id="app" class="app-shell" hidden>
      <div id="detail-bar" class="detail-bar" hidden></div>
      <div id="screen-today"    class="screen" data-screen="today"></div>
      <div id="screen-path"     class="screen" data-screen="path"     hidden></div>
      <div id="screen-review"   class="screen" data-screen="review"   hidden></div>
      <div id="screen-speak"    class="screen" data-screen="speak"    hidden></div>
      <div id="screen-library"  class="screen" data-screen="library"  hidden></div>
      <div id="screen-progress" class="screen" data-screen="progress" hidden></div>
      <div id="screen-menu"     class="screen" data-screen="menu"     hidden></div>
      <div id="screen-detail"   class="screen" data-screen="detail"   hidden></div>

      <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
        <button class="nav-btn" data-nav="learn" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 3H20v18H6.5A2.5 2.5 0 0 1 4 18.5v-14A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg>
          <span>Learn</span>
        </button>
        <button class="nav-btn" data-nav="practice" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/></svg>
          <span>Practice</span>
        </button>
        <button class="nav-btn" data-nav="progress" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M22 20H2"/></svg>
          <span>Progress</span>
        </button>
        <button class="nav-btn" data-nav="home" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M10 9l5 3-5 3z"/></svg>
          <span>Continue</span>
        </button>
      </nav>
    </div>
  </body>
</html>
