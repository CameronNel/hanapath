<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>HanaPath</title>
    <meta name="description" content="A Korean fluency operating system. From zero to B2-level Korean." />
    <meta name="theme-color" content="#0f1026" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HanaPath" />
    <link rel="stylesheet" href="./styles.css?v=20260626d" />
    <script defer src="./app.js?v=20260626d"></script>
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <!-- Onboarding wizard -->
    <div id="onboarding" class="screen-shell"></div>

    <!-- Main app shell -->
    <div id="app" class="app-shell" hidden>
      <div id="screen-today"    class="screen" data-screen="today"></div>
      <div id="screen-path"     class="screen" data-screen="path"     hidden></div>
      <div id="screen-review"   class="screen" data-screen="review"   hidden></div>
      <div id="screen-speak"    class="screen" data-screen="speak"    hidden></div>
      <div id="screen-library"  class="screen" data-screen="library"  hidden></div>
      <div id="screen-progress" class="screen" data-screen="progress" hidden></div>

      <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
        <button class="nav-btn" data-tab="alphabet" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Alphabet</span>
        </button>
        <button class="nav-btn" data-tab="vocabulary" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>Vocabulary</span>
        </button>
        <button class="nav-btn" data-tab="sentences" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16M4 12h10M4 19h13"/></svg>
          <span>Sentences</span>
        </button>
        <button class="nav-btn" data-tab="listening" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V7a4 4 0 0 0-4-4z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
          <span>Listening</span>
        </button>
      </nav>
    </div>
  </body>
</html>
