name: Deploy to GitHub Pages

# Publishes the static site to https://cameronnel.github.io/hanapath/ on every
# push to main, so the live link always reflects the latest version of the app.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy needs (read the repo, write the Pages deployment).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # The whole repo root is the site (index.html lives at the root), so the
      # app, styles, audio assets and CSV all ship as-is.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
